<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Status</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f5f6fa;
        }

        .wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        .logo-box {
            background: #1f4e79;
            display: inline-block;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }

        .logo {
            height: 40px;
        }

        h2 {
            color: #1f4e79;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
            font-size: 16px;
            max-width: 420px;
        }

        .btn {
            padding: 10px 18px;
            background-color: #1f4e79;
            color: white;
            border: none;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            display: inline-block;
        }

        .btn:hover {
            background-color: #163a5c;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="container">

        <!-- LOGO -->
        <div class="logo-box">
            <img src="/logo_carpoint.png" class="logo">
        </div>

        <h2 id="title">Loading...</h2>
        <p id="message"></p>

        <a href="/.auth/login/aad?prompt=select_account" class="btn">
            Login
        </a>

    </div>
</div>

<script>

    const params = new URLSearchParams(window.location.search);
    const reason = params.get("reason");

    if (reason === "external") {
        document.getElementById("title").innerText = "Access Denied";
        document.getElementById("message").innerText =
            "This application is restricted to Carpoint users only. Please sign in using your @carpoint.it account.";
    } else {
        document.getElementById("title").innerText = "Logged Out";
        document.getElementById("message").innerText =
            "You have successfully logged out.";
    }

</script>

</body>
</html>
