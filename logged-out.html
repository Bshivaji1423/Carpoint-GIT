<!DOCTYPE html>
<html>
<head>
    <title>Status</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            background-color: #f5f6fa;
        }

        .container {
            margin-top: 120px;
        }

        .logo {
            height: 60px;
            margin-bottom: 20px;
        }

        h2 {
            color: #1f4e79;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
            font-size: 16px;
        }

        button {
            padding: 10px 18px;
            background-color: #1f4e79;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #163a5c;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ✅ LOGO -->
    <img src="/logo_carpoint.png" class="logo">

    <h2 id="title">Loading...</h2>
    <p id="message"></p>

    <button onclick="login()">Login</button>

</div>

<script>

    const params = new URLSearchParams(window.location.search);
    const reason = params.get("reason");

    if (reason === "external") {
        document.getElementById("title").innerText = "⛔ Access Denied";
        document.getElementById("message").innerText =
            "This application is available only for authorized Carpoint users.";
    } else {
        document.getElementById("title").innerText = "Logged Out";
        document.getElementById("message").innerText =
            "You have successfully logged out.";
    }

    function login() {
        window.location.href = "/.auth/login/aad?prompt=select_account";
    }

</script>

</body>
</html>
