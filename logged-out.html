<!DOCTYPE html>
<html>
<head>
    <title>Status</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 120px;">

    <h2 id="title">Loading...</h2>
    <p id="message"></p>

    <button onclick="login()">Login</button>

    <script>

        const params = new URLSearchParams(window.location.search);
        const reason = params.get("reason");

        if (reason === "external") {
            document.getElementById("title").innerText = "Access Restricted";
            document.getElementById("message").innerText =
                "⛔ Access Denied";
        } else {
            document.getElementById("title").innerText = "Logged Out";
            document.getElementById("message").innerText =
                "You have successfully logged out.";
        }

        function login() {
            window.location.href = "/.auth/login/aad?prompt=select_account";
        }

    </script>

</body>
</html>
