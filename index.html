<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <title>Inevaso Report</title>

    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial;
        }

        #app {
            display: none;
            height: 100%;
        }

        #denied {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #f5f6fa;
            text-align: center;
        }

        .header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: linear-gradient(90deg, #1f4e79, #2b6cb0);
            color: white;
        }

        .logo {
            height: 40px;
        }

        .right a {
            margin-left: 10px;
            padding: 6px 10px;
            background: white;
            color: #1f4e79;
            text-decoration: none;
            font-weight: bold;
        }

        #reportContainer {
            width: 100%;
            height: calc(100vh - 70px);
        }
    </style>
</head>

<body>

<!-- 🔴 ACCESS DENIED -->
<div id="denied">

    <img src="/logo_carpoint.png" style="height:60px; margin-bottom:20px;">

    <h2 style="color:#1f4e79;">
        ⛔ Access Denied
    </h2>

    <p style="color:#555; max-width:400px;">
        This application is restricted to Carpoint users only.<br>
        Please sign in using your <b>@carpoint.it</b> account.
    </p>

    <a href="/.auth/login/aad?prompt=select_account"
       style="
        margin-top:20px;
        padding:10px 18px;
        background:#1f4e79;
        color:white;
        text-decoration:none;
        font-weight:bold;
       ">
        Login with correct account
    </a>

</div>

<!-- ✅ FULL APP -->
<div id="app">

    <div class="header">
        <img src="/logo_carpoint.png" class="logo">

        <div class="right">
            <span id="username"></span>
        
            <a id="loginBtn"
               href="/.auth/login/aad?tenantId=1113460a-1574-4516-95b0-02c76e168800">
                Login
            </a>
        
            <a id="logoutBtn"
               href="/.auth/logout?post_logout_redirect_uri=/logged-out.html">
                Logout
            </a>
        </div>
    </div>

    <div id="reportContainer"></div>

</div>

<script>

// ================= INIT =================
init();

async function init() {

    try {
        const res = await fetch('/.auth/me');
        const data = await res.json();

        if (!data.clientPrincipal) {
            showDenied();
            return;
        }

        const userEmail = data.clientPrincipal.userDetails.toLowerCase();

        if (!userEmail.endsWith("@carpoint.it")) {
            showDenied();
            return;
        }

        // ✅ SHOW APP
        document.getElementById("app").style.display = "block";
        document.getElementById("username").innerText = userEmail;

        loadReport();

    } catch (err) {
        console.error(err);
        showDenied();
    }
}

// ================= LOAD REPORT =================
async function loadReport() {

    try {
        const response = await fetch("/api/getEmbedToken");

        if (!response.ok) {
            showDenied();
            return;
        }

        const data = await response.json();

        const models = window['powerbi-client'].models;

        const config = {
            type: 'report',
            tokenType: models.TokenType.Embed,
            accessToken: data.accessToken,
            embedUrl: data.embedUrl,
            id: data.reportId
        };

        const container = document.getElementById("reportContainer");

        powerbi.reset(container);
        powerbi.embed(container, config);

    } catch (err) {
        console.error(err);
        showDenied();
    }
}

// ================= ACCESS DENIED =================
function showDenied() {
    document.getElementById("denied").style.display = "flex";
    document.getElementById("app").style.display = "none";
}

</script>

</body>
</html>
