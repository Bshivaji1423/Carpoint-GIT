<!DOCTYPE html>
<html>
<head>
    <title>Inevaso Report</title>
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: linear-gradient(90deg, #1f4e79, #2b6cb0);
            color: white;
        }

        .logo {
            height: 40px;
        }

        .right {
            font-size: 14px;
        }

        .right a {
            margin-left: 15px;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
        }

        /* REPORT FULLSCREEN */
        #reportContainer {
            width: 100%;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="left">
            <img src="/logo_carpoint.png" class="logo">
        </div>
        <div class="right">
            <span id="username">Loading...</span>
            <a href="/.auth/logout">Logout</a>
        </div>
    </div>

    <!-- REPORT -->
    <div id="reportContainer"></div>

    <script>
        async function loadUser() {
            try {
                const response = await fetch('/.auth/me');
                const data = await response.json();

                if (data.clientPrincipal) {
                    document.getElementById("username").innerText =
                        data.clientPrincipal.userDetails;
                } else {
                    document.getElementById("username").innerText = "Not logged in";
                }
            } catch {
                document.getElementById("username").innerText = "Error";
            }
        }

        async function loadReport() {
            const response = await fetch("/api/getEmbedToken");
            const data = await response.json();

            const models = window['powerbi-client'].models;

            const embedConfig = {
                type: 'report',
                tokenType: models.TokenType.Embed,
                accessToken: data.accessToken,
                embedUrl: data.embedUrl,
                id: data.reportId,
                settings: {
                    panes: {
                        filters: { visible: false },
                        pageNavigation: { visible: false }
                    },
                    layoutType: models.LayoutType.FitToPage
                }
            };

            const container = document.getElementById("reportContainer");
            powerbi.embed(container, embedConfig);
        }

        loadUser();
        loadReport();
    </script>

</body>
</html>
