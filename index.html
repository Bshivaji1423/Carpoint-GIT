<!DOCTYPE html>
<html>
<head>
    <title>Inevaso Report</title>

    <!-- Power BI -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

    <!-- MSAL -->
    <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial;
        }

        .header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: #1f4e79;
            color: white;
        }

        .logo { height: 40px; }

        .right button {
            margin-left: 10px;
            padding: 6px 10px;
            border: none;
            cursor: pointer;
        }

        #reportContainer {
            height: calc(100vh - 70px);
        }
    </style>
</head>

<body>

<div class="header">
    <img src="/logo_carpoint.png" class="logo">

    <div>
        <span id="username">Loading...</span>
        <button id="loginBtn" onclick="login()" style="display:none;">Login</button>
        <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
    </div>
</div>

<div id="reportContainer"></div>

<script>

const msalConfig = {
    auth: {
        clientId: "0ce2d6b1-f1fc-4d5a-8f14-ea99c6a2cca4",
        authority: "https://login.microsoftonline.com/1113460a-1574-4516-95b0-02c76e168800",
        redirectUri: window.location.origin
    }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

let reportLoaded = false;

// ================= LOGIN =================
function login() {
    msalInstance.loginRedirect({
        scopes: ["User.Read"]
    });
}
// ================= LOGOUT =================
function logout() {
    msalInstance.logoutRedirect({
        postLogoutRedirectUri: window.location.origin
    });
}

// ================= LOAD USER =================
function loadUser() {

    let account = msalInstance.getActiveAccount();

    if (!account) {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
            account = accounts[0];
            msalInstance.setActiveAccount(account);
        }
    }

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    if (account) {
        document.getElementById("username").innerText = account.username;

        loginBtn.style.display = "none";
        logoutBtn.style.display = "inline-block";

        if (!reportLoaded) {
            reportLoaded = true;
            loadReport(account);
        }

    } else {
        document.getElementById("username").innerText = "Not logged in";

        loginBtn.style.display = "inline-block";
        logoutBtn.style.display = "none";
    }
}

// ================= LOAD REPORT =================
async function loadReport(account) {

    try {

        const tokenResponse = await msalInstance.acquireTokenSilent({
            scopes: ["User.Read"],
            account: account
        });

        const response = await fetch("/api/getEmbedToken", {
            headers: {
                Authorization: `Bearer ${tokenResponse.accessToken}`
            }
        });

        if (!response.ok) {
            document.getElementById("reportContainer").innerHTML =
                "<h3 style='padding:20px'>Access denied</h3>";
            return;
        }

        const data = await response.json();

        const models = window['powerbi-client'].models;

        const embedConfig = {
            type: 'report',
            tokenType: models.TokenType.Embed,
            accessToken: data.accessToken,
            embedUrl: data.embedUrl,
            id: data.reportId
        };

        const container = document.getElementById("reportContainer");
        powerbi.reset(container);
        powerbi.embed(container, embedConfig);

    } catch (err) {
        console.error(err);
    }
}

// ================= INIT =================
msalInstance.initialize().then(() => {
    loadUser();
});

</script>

</body>
</html>
