<!DOCTYPE html>
<html>
<head>
    <title>Inevaso Report</title>

    <!-- Power BI -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

    <!-- MSAL -->
    <script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: linear-gradient(90deg, #1f4e79, #2b6cb0);
            color: white;
        }

        .logo {
            height: 40px;
        }

        .right {
            font-size: 14px;
        }

        .right button {
            margin-left: 15px;
            padding: 6px 10px;
            border: none;
            background: white;
            color: #1f4e79;
            cursor: pointer;
            font-weight: bold;
        }

        #reportContainer {
            width: 100%;
            height: calc(100vh - 70px);
        }
    </style>
</head>

<body>

<div class="header">
    <div class="left">
        <img src="/logo_carpoint.png" class="logo">
    </div>

    <div class="right">
        <span id="username">Loading...</span>
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div id="reportContainer"></div>

<script>

    // =============================
    // MSAL CONFIG
    // =============================
    const msalConfig = {
        auth: {
            clientId: "0ce2d6b1-f1fc-4d5a-8f14-ea99c6a2cca4", // your client ID
            authority: "https://login.microsoftonline.com/1113460a-1574-4516-95b0-02c76e168800",
            redirectUri: window.location.origin
        }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    // =============================
    // LOGIN
    // =============================
    async function login() {
        try {
            await msalInstance.loginPopup({
                scopes: ["User.Read"]
            });
            location.reload();
        } catch (err) {
            console.error(err);
        }
    }

    // =============================
    // LOGOUT
    // =============================
    function logout() {
        msalInstance.logoutPopup();
    }

    // =============================
    // LOAD USER
    // =============================
    function loadUser() {
        const accounts = msalInstance.getAllAccounts();

        if (accounts.length > 0) {
            const user = accounts[0];
            document.getElementById("username").innerText = user.username;

            // Load report ONLY if logged in
            loadReport();
        } else {
            document.getElementById("username").innerText = "Not logged in";
        }
    }

    // =============================
    // LOAD POWER BI REPORT
    // =============================
    async function loadReport() {
        try {
            const response = await fetch("/api/getEmbedToken");
            const data = await response.json();

            const models = window['powerbi-client'].models;

            const embedConfig = {
                type: 'report',
                tokenType: models.TokenType.Embed,
                accessToken: data.accessToken,
                embedUrl: data.embedUrl,
                id: data.reportId,
                settings: {
                    panes: {
                        filters: { visible: false },
                        pageNavigation: { visible: false }
                    },
                    layoutType: models.LayoutType.FitToPage
                }
            };

            const container = document.getElementById("reportContainer");
            powerbi.embed(container, embedConfig);

        } catch (err) {
            console.error("Report load failed:", err);
        }
    }

    // INIT
    loadUser();

</script>

</body>
</html>
