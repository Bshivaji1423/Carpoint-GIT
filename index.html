<!DOCTYPE html>
<html>
<head>
    <title>Inevaso Report</title>

    <!-- Power BI -->
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial;
        }

        .header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: linear-gradient(90deg, #1f4e79, #2b6cb0);
            color: white;
        }

        .logo { height: 40px; }

        .right a {
            margin-left: 10px;
            padding: 6px 10px;
            background: white;
            color: #1f4e79;
            text-decoration: none;
            font-weight: bold;
        }

        #reportContainer {
            width: 100%;
            height: calc(100vh - 70px);
        }
    </style>
</head>

<body>

<div class="header">
    <img src="/logo_carpoint.png" class="logo">

    <div class="right">
        <span id="username">Loading...</span>
        <a href="/.auth/login/aad">Login</a>
        <a href="/.auth/logout?post_logout_redirect_uri=/logged-out.html">Logout</a>
    </div>
</div>

<div id="reportContainer"></div>

<script>

// ================= GET USER =================
async function getUser() {
    const res = await fetch('/.auth/me');
    const data = await res.json();

    if (data.clientPrincipal) {
        document.getElementById("username").innerText =
            data.clientPrincipal.userDetails;

        loadReport();
    } else {
        document.getElementById("username").innerText = "Not logged in";
    }
}

// ================= LOAD REPORT =================
async function loadReport() {

    const response = await fetch("/api/getEmbedToken");

    if (!response.ok) {
        document.getElementById("reportContainer").innerHTML =
            "<h3 style='padding:20px'>Access denied</h3>";
        return;
    }

    const data = await response.json();

    const models = window['powerbi-client'].models;

    const embedConfig = {
        type: 'report',
        tokenType: models.TokenType.Embed,
        accessToken: data.accessToken,
        embedUrl: data.embedUrl,
        id: data.reportId
    };

    const container = document.getElementById("reportContainer");

    powerbi.reset(container);
    powerbi.embed(container, embedConfig);
}

// INIT
getUser();

</script>

</body>
</html>
